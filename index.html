<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Loja de PDFs</title>

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f4f4f4;
    }

    header {
      background: #111;
      color: white;
      padding: 20px;
      text-align: center;
    }

    .container {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      padding: 20px;
    }

    .produto {
      background: white;
      padding: 20px;
      margin: 10px;
      border-radius: 12px;
      width: 220px;
      text-align: center;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    button {
      background: #00a650;
      color: white;
      border: none;
      padding: 10px;
      width: 100%;
      border-radius: 6px;
      cursor: pointer;
    }

    button:hover {
      background: #008f44;
    }
  </style>
</head>

<body>

<header>
  <h1>Loja de PDFs</h1>
</header>

<div class="container">

  <div class="produto">
    <h3>Planner Semanal</h3>
    <p>R$ 9,90</p>
    <button>Comprar</button>
  </div>

  <div class="produto">
    <h3>Cartões Decorativos</h3>
    <p>R$ 7,90</p>
    <button>Comprar</button>
  </div>

</div>

</body>
</html>
