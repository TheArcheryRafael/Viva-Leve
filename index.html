<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Vida Leve</title>

  <style>
    body {
      margin: 0;
      font-family: 'Arial', sans-serif;
      background: #f7f3f0;
      color: #333;
    }

    header {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      position: relative;
      padding: 20px;
    }

    h1 {
      font-size: 48px;
      font-weight: 300;
      margin-bottom: 10px;
    }

    .frase {
      font-style: italic;
      font-size: 16px;
      color: #777;
      margin-bottom: 30px;
    }

    .botao {
      background: #e8bcbc;
      border: none;
      padding: 12px 25px;
      border-radius: 25px;
      cursor: pointer;
      font-size: 14px;
    }

    .botao:hover {
      background: #d6a5a5;
    }

    .decoracao {
      position: absolute;
      opacity: 0.1;
      font-size: 60px;
    }

    .top-left {
      top: 20px;
      left: 20px;
    }

    .bottom-right {
      bottom: 20px;
      right: 20px;
    }

    section {
      padding: 60px 20px;
      text-align: center;
    }

    .texto {
      max-width: 600px;
      margin: auto;
      font-size: 18px;
      line-height: 1.6;
    }

    .categorias {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 20px;
      margin-top: 40px;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 15px;
      width: 180px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.05);
      cursor: pointer;
    }

    .card:hover {
      transform: translateY(-5px);
    }

  </style>
</head>

<body>

<header>
  <div class="decoracao top-left">🍃</div>
  <div class="decoracao bottom-right">🕊️</div>

  <h1>Vida Leve</h1>
  <div class="frase">mais livre posso voar</div>
  <button class="botao" onclick="rolar()">Ver produtos</button>
</header>

<section>
  <div class="texto">
    Organize seus momentos com mais leveza.<br><br>
    Crie uma rotina simples, bonita e significativa.
  </div>
</section>

<section id="produtos">
  <h2>Categorias</h2>

  <div class="categorias">
    <div class="card">Lembrancinhas</div>
    <div class="card">Cartões</div>
    <div class="card">Planner</div>
    <div class="card">Kits</div>
  </div>
</section>

  <script>
function rolar() {
  document.getElementById("produtos").scrollIntoView({
    behavior: "smooth"
  });
}
</script>
</body>
</html>
